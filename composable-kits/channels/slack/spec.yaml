schemaVersion: "1"
kind: channel
name: slack
displayName: Slack
description: "Gives an agent a Slack messaging channel (socket mode). Reusable across ANY agent kit via the agent-context contract. Store tokens with: sbx secret set -g slack_bot and sbx secret set -g slack_app."

network:
  allowedDomains:
    - slack.com
    - wss-primary.slack.com

# Two secrets -- demonstrates the contract handling per-channel auth that varies
# (Telegram needs one token, Slack socket mode needs two).
secrets:
  - ref: slack_bot
    description: "Slack bot token; injected by the sbx proxy."
  - ref: slack_app
    description: "Slack app-level token for socket mode; injected by the sbx proxy."

environment:
  variables: {}

commands:
  initFiles:
    - path: /etc/sbx/agent-context.d/slack.json
      mode: "0644"
      source: agent-context.json
      description: "Declares this channel to the agent via the agent-context contract."
