schemaVersion: "1"
kind: agent
name: atlas
displayName: Atlas
description: "Second demo agent with a DIFFERENT native config format (JSON, not TOML). Consumes the exact same agent-context fragments as Nova -- proving provider/channel kits are reusable across agents that share nothing internally."

image: docker.io/library/python:3.12-slim

network:
  allowedDomains:
    - pypi.org
    - files.pythonhosted.org

commands:
  initFiles:
    - path: /home/agent/atlas/reconcile.py
      mode: "0755"
      source: reconcile.py
      description: "Reconciler: reads agent-context.d and renders config.json."

  startup:
    - command: "python3 /home/agent/atlas/reconcile.py"
      user: "1000"
      description: "Render native config from agent-context.d (agent goes last)."
    - command: "node /home/agent/atlas/serve.js"
      user: "1000"
      description: "Launch the agent (illustrative)."
