schemaVersion: "1"
kind: provider
name: openai
displayName: OpenAI
description: "Configures an agent's LLM provider to use OpenAI. Reusable across ANY agent kit via the agent-context contract. Store the key with: sbx secret set -g openai (the kit holds no key)."

# Domains this kit opens. The agent never has to know about them -- the kit
# declares them, and build mode / the proxy can audit exactly this set.
network:
  allowedDomains:
    - api.openai.com

# First-class secret declaration (NEW vs. mixin schema). The kit names the
# secret it needs as a REF; the sbx proxy injects the value at runtime so it is
# never present in the sandbox. This is the gap "oauth/secrets in mixins" closes.
secrets:
  - ref: openai
    description: "OpenAI API key; injected by the sbx proxy from the stored 'openai' secret."

environment:
  variables:
    OPENAI_BASE_URL: "https://api.openai.com/v1"

commands:
  # Written at BUILD time (not startup) so it is guaranteed present before any
  # agent startup command runs -- this is what lets the agent 'get the last word'
  # without an engine lifecycle change.
  initFiles:
    - path: /etc/sbx/agent-context.d/openai.json
      mode: "0644"
      source: agent-context.json
      description: "Declares this provider to the agent via the agent-context contract."
