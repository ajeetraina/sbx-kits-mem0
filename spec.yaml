schemaVersion: "1"
kind: mixin
name: mem0
displayName: Mem0 (Docker Model Runner)
description: "Adds the Mem0 memory layer (mem0ai) to an agent, pre-wired to a local Docker Model Runner for both the LLM and the embedder — no cloud credentials, no external vector database."

network:
  allowedDomains:
    - pypi.org
    - files.pythonhosted.org
    - huggingface.co
    - cdn-lfs.huggingface.co
    - cdn-lfs-us-1.huggingface.co
    # spaCy's `download` command resolves the model version from a
    # compatibility table on raw.githubusercontent.com, then pip-installs
    # the wheel from a GitHub release (github.com → release-assets.githubusercontent.com).
    - raw.githubusercontent.com
    - github.com
    - release-assets.githubusercontent.com

environment:
  variables:
    OPENAI_BASE_URL: "http://host.docker.internal:12434/engines/v1"
    OPENAI_API_KEY: "dmr"
    MEM0_TELEMETRY: "false"
    # Override the sandbox proxy's NO_PROXY, which includes the IPv6 literal "::1"
    # that older httpx versions fail to parse (httpx.InvalidURL: Invalid port ':1]').
    # Keep host.docker.internal so DMR traffic continues to bypass the egress proxy.
    NO_PROXY: "localhost,127.0.0.1,host.docker.internal"
    no_proxy: "localhost,127.0.0.1,host.docker.internal"

commands:
  install:
    - command: "pip install --break-system-packages 'mem0ai[nlp]==2.0.5'"
      user: "1000"
      description: "Install Mem0 with NLP extras (spaCy lemmatization)"
    - command: "pip install --break-system-packages fastembed"
      user: "1000"
      description: "Install fastembed for BM25 keyword search"
    - command: "PIP_BREAK_SYSTEM_PACKAGES=1 python3 -m spacy download en_core_web_sm"
      user: "1000"
      description: "Download spaCy English model (env var lets spacy's internal pip call bypass PEP 668)"
  initFiles:
    - path: /home/agent/.mem0/config.json
      mode: "0644"
      onlyIfMissing: true
      description: "Mem0 config wired to Docker Model Runner (editable)"
      content: |
        {
          "vector_store": {
            "provider": "qdrant",
            "config": {
              "collection_name": "mem0",
              "path": "/home/agent/.mem0/qdrant",
              "on_disk": true,
              "embedding_model_dims": 1024
            }
          },
          "llm": {
            "provider": "openai",
            "config": {
              "model": "ai/gemma3",
              "openai_base_url": "http://host.docker.internal:12434/engines/v1",
              "api_key": "dmr"
            }
          },
          "embedder": {
            "provider": "openai",
            "config": {
              "model": "ai/mxbai-embed-large",
              "openai_base_url": "http://host.docker.internal:12434/engines/v1",
              "api_key": "dmr",
              "embedding_dims": 1024
            }
          }
        }

memory: |
  ## Mem0 memory layer

  The `mem0ai` package is installed and pre-wired to a local Docker Model
  Runner (config at `~/.mem0/config.json`), so `Memory.from_config(...)`
  add/search works with no cloud keys or external vector database.
